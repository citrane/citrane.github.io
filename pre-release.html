<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Citrane</title>
</head>
<body>

<h1>citrane</h1>

<form id="searchForm">
  <input type="text" id="searchInput" name="q" placeholder="Search...">
  <button type="submit">Search</button>
</form>

<div id="results"></div>

<script>
const params = new URLSearchParams(window.location.search);
const query = params.get("q");

const input = document.getElementById("searchInput");
const resultsDiv = document.getElementById("results");

if(query){
  input.value = query;
  fetchResults(query);
}

document.getElementById("searchForm").addEventListener("submit", e=>{
  e.preventDefault();
  const q = input.value.trim();
  if(!q) return;

  window.location.search = "?q=" + encodeURIComponent(q);
});

async function fetchResults(q){
  resultsDiv.innerHTML = "Loading...";

  try{
    const res = await fetch(`https://mkkp33-5000.csb.app/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();

    renderResults(data.results);
  }catch(err){
    resultsDiv.innerHTML = "Error loading results";
    console.error(err);
  }
}

function renderResults(results){
  if(!results || results.length === 0){
    resultsDiv.innerHTML = "<p>No results.</p>";
    return;
  }

  resultsDiv.innerHTML = results.map(r => `
    <div class="result">
      <a href="${r.url}" target="_blank">${escapeHTML(r.title)}</a>
      <div class="url">${r.url}</div>
      <p class="snippet">${escapeHTML(r.content.slice(0,200))}...</p>
    </div>
  `).join("");
}

function escapeHTML(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
</script>

</body>
</html>
